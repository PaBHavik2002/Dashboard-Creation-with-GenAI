{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Agent-Based Analytical Tool</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Flowbite CSS -->
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="{% static 'backend/style/chatPage.css' %}" />
</head>

<body>
  <!-- Your page HTML here -->
  <nav id="mainHeader" class="bg-neutral-primary fixed w-full z-20 top-0 start-0 border-default">
    <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
      <a href="#" class="flex items-center space-x-3 rtl:space-x-reverse">
        <img src="{% static 'sagittarius_transparent.png' %}" class="h-20" alt="Bhavik's Image" />
        <span class="self-center text-xl text-heading font-semibold whitespace-nowrap">Bhavik Parmar</span>
      </a>
      <button data-collapse-toggle="navbar-dropdown" type="button"
        class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
        aria-controls="navbar-dropdown" aria-expanded="false">
        <span class="sr-only">Open main menu</span>
        <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
          viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
        </svg>
      </button>
      <div class="hidden w-full md:block md:w-auto" id="navbar-dropdown">
        <ul
          class="flex flex-col font-medium p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-neutral-primary">
          <li>
            <a href="#" class="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0"
              aria-current="page">Home</a>
          </li>
          <li>
            <a href="#"
              class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">Myself</a>
          </li>
          <li>
            <a href="#"
              class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">Projects</a>
          </li>
          <li>
            <a href="#"
              class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- This is the main side bar -->>
  <div class="Main-Side-Bar">

    <aside id="default-sidebar"
      class="fixed top-[120px] left-0 z-40 w-64 h-[calc(100vh-120px)] transition-transform -translate-x-full sm:translate-x-0"
      aria-label="Sidebar">
      <div class="h-full px-3 py-4 overflow-y-auto bg-neutral-primary-soft border-e border-default">

      </div>
    </aside>

    <div class="p-4 sm:ml-64">
      <div class="p-4 border-1 border-default border-dashed rounded-base min-h-[calc(100vh-140px)]">
        <div class="prompt-stage" id="promptStage">

          <!-- Optional intro text for initial state -->
          <div class="prompt-intro" id="promptIntro">
            <h1>What would you like to analyze?</h1>
            <p class="prompt-subtitle">
              Ask for charts, dashboards, insights, summaries, or data analysis workflows.
            </p>
          </div>

          <!-- Same prompt bar used in both initial and bottom states -->
          <div class="chat-prompt-bar" id="chatPromptBar">

            <button type="button" class="chat-circle-btn" aria-label="Add file">
              +
            </button>

            <input type="text" class="chat-prompt-input" id="chatPromptInput" placeholder="" autocomplete="off" />
            <button type="button" class="chat-submit-btn" id="chatSubmitBtn" aria-label="Send prompt">
              <svg class="chat-submit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                <path d="M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>

          </div>

          <!-- Response area appears after first submit -->
          <div class="chat-response-area" id="chatResponseArea"></div>

        </div>

      </div>

    </div>
  </div>
  <!-- Flowbite JS -->
  <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

  <!-- Your custom JS -->
  <script src="{% static 'backend/chatPage.js' %}"></script>
</body>

</html>
